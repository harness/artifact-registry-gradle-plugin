plugins {
    id 'maven-publish'
    id 'java-gradle-plugin'
    id 'com.gradle.plugin-publish' version '1.2.1'

}

group = 'io.harness'
version = '1.0.1'


repositories {
    mavenCentral()
}

gradlePlugin {
    website = "https://github.com/harness/artifact-registry-gradle-plugin"
    vcsUrl = "https://github.com/harness/artifact-registry-gradle-plugin"

    plugins {
        create("harnessGradlePlugin") {
            id = 'io.harness.gradle'
            displayName = "Harness Gradle Plugin"
            description = "Harness Gradle plugin to deploy artifacts to Harness registry with optimized approach"
            implementationClass = 'io.harness.gradle.plugin.HarnessDeploymentPlugin'
            tags = ["harness", "publishing", "deployment", "artifact"]
        }
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}
